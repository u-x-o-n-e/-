<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="./imagenes/favicon.ico">
    <link rel="stylesheet" href="css/estilos.css">
    <title>Generador de Código QR</title>
</head>
<body>
    <!-- Principal -->
    <main>
        <div class="contenedor">
            <form>
                <h1 class="form-titulo">Generador de QR</h1>
                <p class="text-aviso"></p>
                <input type="text" class="text-input" placeholder="Ingresa el texto para generar el código QR">

                <div class="personalizacion">
                    <!-- Color -->
                    <div class="color">
                        <label for="inputColor">Color del QR</label>
                        <input type="color" id="inputColor" class="input-color" value="#000000">
                        <!-- Campo para el color de las esquinas exteriores -->
                        <input type="color" id="inputColorEsquinasExternas" value="#0964ff">
                        <!-- Campo para el color de las esquinas interiores -->
                        <input type="color" id="inputColorEsquinasInternas" value="#000000">
                    </div>

                    <!-- Forma de los puntos -->
                    <div class="tipo-puntos">
                        <label for="tipoPuntos">Forma de los puntos</label>
                        <select id="tipoPuntos" class="select-forma">
                            <option value="square">Cuadrados</option>
                            <option value="dots">Puntos</option>
                            <option value="rounded">Redondeados</option>
                            <option value="extra-rounded">Extra Redondeados</option>
                        </select>
                    </div>

                    <!-- Estilo de las esquinas -->
                    <div class="tipo-esquinas">
                        <label for="tipoEsquinas">Estilo de las esquinas</label>
                        <select id="tipoEsquinas" class="select-esquinas">
                            <option value="square">Cuadrado</option>
                            <option value="dots">Puntos</option>
                            <option value="extra-rounded">Extra Redondeado</option>
                        </select>
                    </div>

                    <!-- Tamaño -->
                    <div class="tamaño">
                        <label for="tamañoQR">Tamaño (px)</label>
                        <input type="number" id="tamañoQR" class="input-tamaño" min="315" max="800" value="315">
                    </div>
                </div>

                <!-- Subir imagen -->
                <input type="file" class="seleccion-img" accept=".png, .jpg, .jpeg, .svg">

                <!-- Contenedor QR -->
                <div class="qrcode">Aquí el Qr</div>
                <div class="btns">
                  <button class="btn-generar">Generar QR</button>
                <button class="btn-descargar">Descargar QR</button>
                </div>
            </form>
        </div>
        <footer>
    <div class="footer-contenido">
        <div class="empresa">
            <img src="css/img/LogoBlanco.png" alt="Logo de la Empresa" class="logo-empresa">
            <p class="descripcion">Tu empresa innovadora.</p>
        </div>

        <div class="redes-sociales">
            <a href="https://www.facebook.com/empresa" target="_blank" class="icono"><i class="fab fa-facebook-f"></i></a>
            <a href="https://www.instagram.com/empresa" target="_blank" class="icono"><i class="fab fa-instagram"></i></a>
            <a href="https://twitter.com/empresa" target="_blank" class="icono"><i class="fab fa-twitter"></i></a>
            <a href="mailto:empresa@correo.com" class="icono"><i class="fas fa-envelope"></i></a>
        </div>

        <div class="informacion">
            <!--<p class="correo">Correo: <a href="mailto:empresa@correo.com">empresa@correo.com</a></p>-->
            <!--<p class="licencia">Licencia: <a href="licencia.html">Licencia de Uso</a></p>-->
            <p class="copyright">Copyright © <span id="fecha-copyright"></span> <a href="https://www.empresa.com" class="empresa-link">UXONE INC</a>.</p>
        </div>
    </div>
</footer>
    </main>

    <!-- Scripts -->
    <script src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <script src="/js/generador.js"></script>
    <script>
      // Función para actualizar el año en el footer
function actualizarFechaCopyright() {
    const fecha = new Date();
    const año = fecha.getFullYear();
    document.getElementById('fecha-copyright').textContent = año;
}

// Llamar a la función para actualizar el año al cargar la página
window.onload = actualizarFechaCopyright;
    </script>
</body>
</html>
